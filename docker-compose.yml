services:
  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    ports:
      - "${GATEWAY_HOST_PORT:-3000}:${GATEWAY_PORT:-3000}"
    environment:
      GATEWAY_PORT: "${GATEWAY_PORT:-3000}"
      REPLICA_MAP: "${REPLICA_MAP:-replica1=http://replica1:4001,replica2=http://replica2:4002,replica3=http://replica3:4003}"
    depends_on:
      - replica1
      - replica2
      - replica3
    networks:
      - raft-net
    volumes:
      - ./:/app
      - /app/node_modules

  replica1:
    build:
      context: .
      dockerfile: services/replica1/Dockerfile
    environment:
      REPLICA_ID: "${REPLICA1_ID:-replica1}"
      PORT: "${REPLICA1_PORT:-4001}"
      PEERS: "${REPLICA1_PEERS:-replica2=http://replica2:4002,replica3=http://replica3:4003}"
      GATEWAY_URL: "${REPLICA_GATEWAY_URL:-http://gateway:3000}"
      GATEWAY_NOTIFY_TIMEOUT_MS: "${GATEWAY_NOTIFY_TIMEOUT_MS:-1000}"
      GATEWAY_NOTIFY_MAX_ATTEMPTS: "${GATEWAY_NOTIFY_MAX_ATTEMPTS:-10}"
      GATEWAY_NOTIFY_RETRY_DELAY_MS: "${GATEWAY_NOTIFY_RETRY_DELAY_MS:-500}"
      HEARTBEAT_INTERVAL_MS: "${HEARTBEAT_INTERVAL_MS:-150}"
      ELECTION_TIMEOUT_MIN_MS: "${ELECTION_TIMEOUT_MIN_MS:-500}"
      ELECTION_TIMEOUT_MAX_MS: "${ELECTION_TIMEOUT_MAX_MS:-800}"
      HEARTBEAT_LOG_INTERVAL_MS: "${HEARTBEAT_LOG_INTERVAL_MS:-4000}"
    ports:
      - "${REPLICA1_HOST_PORT:-4001}:${REPLICA1_PORT:-4001}"
    networks:
      - raft-net
    volumes:
      - ./:/app
      - /app/node_modules

  replica2:
    build:
      context: .
      dockerfile: services/replica2/Dockerfile
    environment:
      REPLICA_ID: "${REPLICA2_ID:-replica2}"
      PORT: "${REPLICA2_PORT:-4002}"
      PEERS: "${REPLICA2_PEERS:-replica1=http://replica1:4001,replica3=http://replica3:4003}"
      GATEWAY_URL: "${REPLICA_GATEWAY_URL:-http://gateway:3000}"
      GATEWAY_NOTIFY_TIMEOUT_MS: "${GATEWAY_NOTIFY_TIMEOUT_MS:-1000}"
      GATEWAY_NOTIFY_MAX_ATTEMPTS: "${GATEWAY_NOTIFY_MAX_ATTEMPTS:-10}"
      GATEWAY_NOTIFY_RETRY_DELAY_MS: "${GATEWAY_NOTIFY_RETRY_DELAY_MS:-500}"
      HEARTBEAT_INTERVAL_MS: "${HEARTBEAT_INTERVAL_MS:-150}"
      ELECTION_TIMEOUT_MIN_MS: "${ELECTION_TIMEOUT_MIN_MS:-500}"
      ELECTION_TIMEOUT_MAX_MS: "${ELECTION_TIMEOUT_MAX_MS:-800}"
      HEARTBEAT_LOG_INTERVAL_MS: "${HEARTBEAT_LOG_INTERVAL_MS:-4000}"
    ports:
      - "${REPLICA2_HOST_PORT:-4002}:${REPLICA2_PORT:-4002}"
    networks:
      - raft-net
    volumes:
      - ./:/app
      - /app/node_modules

  replica3:
    build:
      context: .
      dockerfile: services/replica3/Dockerfile
    environment:
      REPLICA_ID: "${REPLICA3_ID:-replica3}"
      PORT: "${REPLICA3_PORT:-4003}"
      PEERS: "${REPLICA3_PEERS:-replica1=http://replica1:4001,replica2=http://replica2:4002}"
      GATEWAY_URL: "${REPLICA_GATEWAY_URL:-http://gateway:3000}"
      GATEWAY_NOTIFY_TIMEOUT_MS: "${GATEWAY_NOTIFY_TIMEOUT_MS:-1000}"
      GATEWAY_NOTIFY_MAX_ATTEMPTS: "${GATEWAY_NOTIFY_MAX_ATTEMPTS:-10}"
      GATEWAY_NOTIFY_RETRY_DELAY_MS: "${GATEWAY_NOTIFY_RETRY_DELAY_MS:-500}"
      HEARTBEAT_INTERVAL_MS: "${HEARTBEAT_INTERVAL_MS:-150}"
      ELECTION_TIMEOUT_MIN_MS: "${ELECTION_TIMEOUT_MIN_MS:-500}"
      ELECTION_TIMEOUT_MAX_MS: "${ELECTION_TIMEOUT_MAX_MS:-800}"
      HEARTBEAT_LOG_INTERVAL_MS: "${HEARTBEAT_LOG_INTERVAL_MS:-4000}"
    ports:
      - "${REPLICA3_HOST_PORT:-4003}:${REPLICA3_PORT:-4003}"
    networks:
      - raft-net
    volumes:
      - ./:/app
      - /app/node_modules

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    ports:
      - "${DASHBOARD_HOST_PORT:-3001}:${DASHBOARD_PORT:-3001}"
    environment:
      DASHBOARD_PORT: "${DASHBOARD_PORT:-3001}"
      REPLICA_URLS: "${REPLICA_URLS:-http://gateway:3000,http://replica1:4001,http://replica2:4002,http://replica3:4003}"
    depends_on:
      - replica1
      - replica2
      - replica3
    networks:
      - raft-net
    volumes:
      - ./:/app
      - /app/node_modules

networks:
  raft-net:
    driver: bridge
